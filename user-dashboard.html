<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NBVS — User Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
  --muted:#6b7280;
  --card:#ffffff;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"Inter",sans-serif;
  color:#111;
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:18px;
  color:#fff;
  font-weight:700;
  text-align:center;
  font-size:1.4rem;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.card h2{
  margin-top:0;
  font-size:1.25rem;
  font-weight:700;
  color:var(--green);
}

.label{
  color:var(--muted);
  font-size:0.9rem;
}

.value{
  font-size:1.7rem;
  font-weight:800;
  margin-top:6px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
  width:100%;
  margin-top:12px;
}

.btn-green{background:var(--green);color:#fff;}
.btn-yellow{background:var(--yellow);color:#111;}
.btn-red{background:var(--red);color:#fff;}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

.table th, .table td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:0.9rem;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logout{
  background:#111;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  font-size:0.88rem;
  cursor:pointer;
}
</style>
</head>

<body>

<header>NBVS — User Dashboard</header>

<div class="container">

  <div class="top">
    <h2 style="margin:0;">Welcome, <span id="userEmail"></span></h2>
    <button id="logoutBtn" class="logout">Logout</button>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Your Wallet</h2>
      <div class="label">Balance</div>
      <div class="value">¢<span id="balance">0</span></div>

      <button class="btn btn-green" id="add30">Add ¢30</button>
      <button class="btn btn-green" id="add100">Add ¢100</button>
      <button class="btn btn-yellow" id="openVerify">Go to Verify</button>
    </div>

    <div class="card">
      <h2>Your Plan</h2>

      <div class="label">Current Plan</div>
      <div class="value" style="font-size:1.4rem;">
        <span id="planType">—</span>
      </div>

      <div class="label" style="margin-top:12px;">Remaining Searches</div>
      <div class="value" style="font-size:1.4rem;">
        <span id="remaining">0</span>
      </div>

      <button class="btn btn-green" id="buyBasic">Buy Basic (10 searches)</button>
      <button class="btn btn-red" id="buyPro">Buy Pro (30 days)</button>
    </div>

    <div class="card" style="grid-column:1/-1">
      <h2>Your Recent Searches</h2>
      <table class="table">
        <thead>
          <tr><th>Term</th><th>Found?</th><th>Time</th></tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="3" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, query, where, orderBy, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const userEmail   = document.getElementById("userEmail");
const balanceEl   = document.getElementById("balance");
const planTypeEl  = document.getElementById("planType");
const remainingEl = document.getElementById("remaining");
const logBody     = document.getElementById("logBody");

let userId = null;
let walletRef = null;

function toNum(x){ return Number(x) || 0; }

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user){
    return window.location.replace("user-login.html");
  }

  userId = user.uid;
  walletRef = doc(db,"wallet",userId);
  userEmail.textContent = user.email;

  const u = await getDoc(doc(db,"users",userId));
  if(!u.exists() || (u.data().role||"") !== "user"){
    return window.location.replace("user-login.html");
  }

  await ensureWallet();
  await loadWallet();
  await loadLogs();
});

/* CREATE WALLET IF MISSING */
async function ensureWallet(){
  const snap = await getDoc(walletRef);
  if(!snap.exists()){
    await setDoc(walletRef,{
      balance:0,
      plan:"none",
      monthlyRemaining:0,
      planExpires:null,
      createdAt:new Date()
    });
  }
}

/* LOAD WALLET */
async function loadWallet(){
  const snap = await getDoc(walletRef);
  const u = snap.data();

  balanceEl.textContent   = toNum(u.balance);
  planTypeEl.textContent  = u.plan || "none";
  remainingEl.textContent = toNum(u.monthlyRemaining);
}

/* LOAD SEARCH LOGS */
async function loadLogs(){
  const q = query(
    collection(db,"search_logs"),
    where("user","==",userId),
    orderBy("timestamp","desc")
  );

  const snap = await getDocs(q);

  if(snap.empty){
    logBody.innerHTML = `<tr><td colspan="3" class="empty">No searches yet</td></tr>`;
    return;
  }

  logBody.innerHTML = "";
  snap.forEach(d=>{
    const r = d.data();
    const time = r.timestamp?.toDate ? r.timestamp.toDate().toLocaleString() : "—";

    logBody.innerHTML += `
      <tr>
        <td>${r.term}</td>
        <td>${r.found ? "✔️" : "❌"}</td>
        <td>${time}</td>
      </tr>
    `;
  });
}

/* BUTTONS */
document.getElementById("add30").onclick = ()=>addMoney(30);
document.getElementById("add100").onclick = ()=>addMoney(100);

async function addMoney(amount){
  const snap = await getDoc(walletRef);
  const bal = toNum(snap.data().balance);

  await updateDoc(walletRef,{balance: bal + amount});

  await addDoc(collection(db,"wallet_transactions"),{
    user:userId,
    amount,
    type:"top_up",
    timestamp:new Date()
  });

  await loadWallet();
}

document.getElementById("buyBasic").onclick = async ()=>{
  const snap = await getDoc(walletRef);
  const u = snap.data();

  await updateDoc(walletRef,{
    plan:"basic",
    monthlyRemaining: toNum(u.monthlyRemaining) + 10
  });

  alert("Basic plan activated!");
  await loadWallet();
};

document.getElementById("buyPro").onclick = async ()=>{
  const exp = new Date(Date.now() + 30*24*60*60*1000);

  await updateDoc(walletRef,{
    plan:"pro",
    planExpires:exp.toISOString()
  });

  alert("Pro plan activated!");
  await loadWallet();
};

document.getElementById("openVerify").onclick = ()=>window.location.href="verify.html";

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  window.location.replace("user-login.html");
};

/* PREVENT BACK BUTTON */
window.history.pushState(null,null,window.location.href);
window.onpopstate = function(){
  window.location.replace("user-login.html");
};

</script>

</body>
</html>
