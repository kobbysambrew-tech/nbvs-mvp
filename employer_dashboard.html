<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NBVS — Employer Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
}

body{
  margin:0;
  font-family:"Segoe UI",Arial;
  background:var(--bg);
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:20px;
  color:#fff;
  text-align:center;
  font-weight:700;
}

.container{
  max-width:1000px;
  margin:20px auto;
  padding:0 16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

h3{
  margin:0 0 10px;
}

.big{
  font-size:1.8rem;
  font-weight:700;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  margin-top:10px;
}

.btn-green{background:var(--green);color:#fff;}
.btn-yellow{background:var(--yellow);}
.btn-red{background:#dc2626;color:#fff;}

.activity{
  border-top:1px solid #eee;
  padding:10px 0;
  display:flex;
  justify-content:space-between;
}

.small{
  font-size:0.85rem;
  color:#6b7280;
}
</style>
</head>

<body>

<header>NBVS — Employer Dashboard</header>

<div class="container">

  <!-- TOP GRID -->
  <div class="grid">

    <!-- WALLET -->
    <div class="card">
      <h3>💰 Wallet Balance</h3>
      <div class="big" id="balance">¢0</div>

      <button class="btn btn-yellow" onclick="goWallet()">Top Up</button>
    </div>

    <!-- PLAN -->
    <div class="card">
      <h3>📦 Plan</h3>
      <div id="plan">—</div>

      <button class="btn btn-green" onclick="goVerify()">Verify Credential</button>
    </div>

  </div>

  <!-- ACTIVITY -->
  <div class="card" style="margin-top:16px">
    <h3>📊 Recent Activity</h3>
    <div id="activity"></div>
  </div>

  <!-- LOGOUT -->
  <div class="card" style="margin-top:16px;text-align:center">
    <button class="btn btn-red" onclick="logout()">Logout</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔒 PROTECT PAGE */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "employer_login.html";
  }
});

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  window.location.href = "employer_login.html";
};
</script>

</body>
</html>
