<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBVS — My Verification</title>

<style>
:root{
  --green:#046c4e;
  --red:#dc2626;
  --orange:#b45309;
  --bg:#f4f6f9;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:var(--bg);
}

header{
  background:linear-gradient(90deg,#ce1126,#fcd116,#046c4e);
  padding:20px;
  color:#fff;
  text-align:center;
  font-weight:700;
}

.container{
  max-width:600px;
  margin:40px auto;
  padding:0 16px;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.id{
  font-size:1.4rem;
  font-weight:800;
  margin-bottom:10px;
}

.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  font-weight:700;
  margin-bottom:14px;
}

.valid{ background:#ecfdf5; color:#065f46; }
.revoked{ background:#fef2f2; color:#991b1b; }
.pending{ background:#fff7e6; color:var(--orange); }

.field{
  margin-bottom:12px;
}

.label{
  font-size:0.8rem;
  color:#6b7280;
}

.value{
  font-weight:600;
}

.note{
  color:#6b7280;
  line-height:1.5;
}
</style>
</head>

<body>

<header>NBVS — My Verified Credential</header>

<div class="container">
  <div class="card">
    <div id="content">Loading...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const content = document.getElementById("content");

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "user-login.html";
    return;
  }

  try {
    // 1) approved record
    const recordQuery = query(
      collection(db,"records"),
      where("userId","==", user.uid),
      limit(1)
    );

    const recordSnap = await getDocs(recordQuery);

    if(!recordSnap.empty){
      const r = recordSnap.docs[0].data();
      const statusValue = (r.status || "valid").toLowerCase();
      const statusClass = statusValue === "valid" ? "valid" : "revoked";

      content.innerHTML = `
        <div class="id">${r.verificationId || "—"}</div>
        <div class="status ${statusClass}">
          ${statusValue.toUpperCase()}
        </div>

        <div class="field">
          <div class="label">Full Name</div>
          <div class="value">${r.graduateName || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Institution</div>
          <div class="value">${r.institutionName || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Qualification</div>
          <div class="value">${r.qualification || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Graduation Year</div>
          <div class="value">${r.graduationYear || "—"}</div>
        </div>
      `;
      return;
    }

    // 2) pending submission
    // First try userId
    const pendingByUserId = query(
      collection(db,"submissions"),
      where("userId","==", user.uid),
      where("status","==","pending"),
      limit(1)
    );

    let submissionSnap = await getDocs(pendingByUserId);

    // Fallback: older submissions may use "user" instead of "userId"
    if(submissionSnap.empty){
      const pendingByUser = query(
        collection(db,"submissions"),
        where("user","==", user.uid),
        where("status","==","pending"),
        limit(1)
      );
      submissionSnap = await getDocs(pendingByUser);
    }

    if(!submissionSnap.empty){
      const s = submissionSnap.docs[0].data();

      content.innerHTML = `
        <div class="status pending">PENDING APPROVAL</div>

        <div class="field">
          <div class="label">Submitted Name</div>
          <div class="value">${s.name || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Institution</div>
          <div class="value">${s.institution || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Qualification</div>
          <div class="value">${s.qualification || "—"}</div>
        </div>

        <div class="field">
          <div class="label">Status</div>
          <div class="value note">Your credential submission has been received and is currently under review by NBVS staff.</div>
        </div>

        <div class="field">
          <div class="label">Next Step</div>
          <div class="value note">Once approved, your NBVS verification ID will appear here automatically.</div>
        </div>
      `;
      return;
    }

    // 3) nothing submitted yet
    content.innerHTML = `
      <div class="field">
        <div class="label">No submission found</div>
        <div class="value">You have not submitted your credentials yet.</div>
      </div>
    `;
  } catch (e) {
    console.error(e);
    content.innerHTML = `
      <div class="field">
        <div class="label">Error</div>
        <div class="value">Something went wrong loading your verification status.</div>
      </div>
    `;
  }
});
</script>

</body>
</html>
