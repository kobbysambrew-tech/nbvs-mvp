<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBVS — Submit for Verification</title>

<style>
body{font-family:Arial;background:#f6f7f9;margin:0;padding:40px}
.card{max-width:500px;margin:auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  background:#046c4e;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
button:disabled{
  background:#999;
  cursor:not-allowed;
}
#msg{margin-top:10px;font-size:14px}
</style>
</head>

<body>

<div class="card">
  <h2>Submit Credentials</h2>

  <input id="name" placeholder="Full Name">
  <input id="institution" placeholder="Institution">
  <input id="qualification" placeholder="Qualification">
  <input id="year" placeholder="Graduation Year">

  <!-- 🔒 disabled by default -->
  <button id="submitBtn" disabled>Submit for Verification</button>

  <div id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");

/* 🔒 AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("user-login.html");
    return;
  }

  userId = user.uid;

  const u = await getDoc(doc(db,"users",userId));
  if(!u.exists() || u.data().role !== "user"){
    window.location.replace("user-login.html");
    return;
  }

  // ✅ enable button AFTER auth loads
  btn.disabled = false;
});

/* 🚀 SUBMIT */
btn.onclick = async ()=>{
  if(!userId){
    msg.innerText = "User not loaded. Refresh page.";
    return;
  }

  const name = document.getElementById("name").value.trim();
  const institution = document.getElementById("institution").value.trim();
  const qualification = document.getElementById("qualification").value.trim();
  const year = document.getElementById("year").value.trim();

  if(!name || !institution || !qualification){
    msg.innerText = "Please fill all fields";
    return;
  }

  try {
    await addDoc(collection(db,"submissions"),{
      user:userId,
      name,
      institution,
      qualification,
      year,
      status:"pending",
      createdAt:new Date()
    });

    msg.innerText = "✅ Submitted! Awaiting approval.";

    // optional clear form
    document.getElementById("name").value = "";
    document.getElementById("institution").value = "";
    document.getElementById("qualification").value = "";
    document.getElementById("year").value = "";

  } catch(e){
    console.error(e);
    msg.innerText = "❌ Error: " + e.message;
  }
};
</script>

</body>
</html>
