<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBVS — Submit Credentials</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --accent:#004f2e;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
}

*{
  box-sizing:border-box;
  font-family:"Inter",Arial,sans-serif;
}

body{
  margin:0;
  background:var(--bg);
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:22px;
  text-align:center;
  color:#fff;
  font-weight:700;
  font-size:1.4rem;
}

.wrapper{
  max-width:700px;
  margin:40px auto;
  padding:0 16px;
}

.card{
  background:var(--card);
  padding:28px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
  margin:0 0 6px;
}

.subtitle{
  color:var(--muted);
  font-size:0.9rem;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:0.95rem;
}

input:focus{
  outline:none;
  border:1px solid var(--green);
  box-shadow:0 0 0 2px rgba(4,108,78,0.15);
}

.full{
  grid-column:1 / -1;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--green);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}

button:disabled{
  background:#9ca3af;
}

#msg{
  margin-top:12px;
  padding:10px;
  border-radius:8px;
  font-size:0.9rem;
}

.success{
  background:#ecfdf5;
  color:#065f46;
}

.error{
  background:#fef2f2;
  color:#991b1b;
}

.trust{
  margin-top:16px;
  font-size:0.8rem;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<header>NBVS — Credential Submission</header>

<div class="wrapper">
  <div class="card">

    <h2>Submit Credentials</h2>
    <div class="subtitle">
      Fill in your official details. NBVS staff will verify and issue your verification ID.
    </div>

    <div class="grid">

      <input id="name" placeholder="Full Name" class="full">

      <input id="dob" placeholder="Date of Birth">
      <input id="region" placeholder="Region">

      <input id="address" placeholder="Address" class="full">

      <input id="institution" placeholder="Institution Name" class="full">

      <input id="qualification" placeholder="Qualification">
      <input id="year" placeholder="Graduation Year">

    </div>

    <button id="submitBtn" disabled>
      Submit for Verification
    </button>

    <div id="msg"></div>

    <div class="trust">
      🔐 Secure submission • Reviewed by NBVS • Fraud detection enabled
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");

/* AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("user-login.html");
    return;
  }

  userId = user.uid;

  const u = await getDoc(doc(db,"users",userId));
  if(!u.exists() || u.data().role !== "user"){
    window.location.replace("user-login.html");
    return;
  }

  btn.disabled = false;
});

/* SUBMIT */
btn.onclick = async ()=>{
  if(!userId){
    msg.className="error";
    msg.innerText="User not loaded. Refresh.";
    return;
  }

  btn.disabled = true;
  msg.innerText = "Submitting...";

  const data = {
    user:userId,
    name:document.getElementById("name").value.trim(),
    dob:document.getElementById("dob").value.trim(),
    region:document.getElementById("region").value.trim(),
    address:document.getElementById("address").value.trim(),
    institution:document.getElementById("institution").value.trim(),
    qualification:document.getElementById("qualification").value.trim(),
    year:document.getElementById("year").value.trim(),
    status:"pending",
    createdAt:new Date()
  };

  /* REQUIRED VALIDATION */
  if(
    !data.name ||
    !data.dob ||
    !data.address ||
    !data.institution ||
    !data.qualification ||
    !data.year
  ){
    msg.className="error";
    msg.innerText="Fill all required fields";
    btn.disabled = false;
    return;
  }

  try{
    await addDoc(collection(db,"submissions"), data);

    msg.className="success";
    msg.innerText="✅ Submitted successfully. Awaiting approval.";

    document.querySelectorAll("input").forEach(i=>i.value="");

  }catch(e){
    console.error(e);
    msg.className="error";
    msg.innerText="❌ " + e.message;
  }

  btn.disabled = false;
};
</script>

</body>
</html>
