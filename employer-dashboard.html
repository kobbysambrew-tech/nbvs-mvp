<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NBVS — Employer Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
  --muted:#6b7280;
  --card:#ffffff;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"Inter",sans-serif;
  color:#111;
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:18px;
  color:#fff;
  font-weight:700;
  text-align:center;
  font-size:1.4rem;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.card h2{
  margin-top:0;
  font-size:1.25rem;
  font-weight:700;
  color:var(--green);
}

.label{
  color:var(--muted);
  font-size:0.9rem;
}

.value{
  font-size:1.7rem;
  font-weight:800;
  margin-top:6px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
  width:100%;
  margin-top:12px;
}

.btn-green{background:var(--green);color:#fff;}
.btn-yellow{background:var(--yellow);color:#111;}
.btn-red{background:var(--red);color:#fff;}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logout{
  background:#111;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>NBVS — Employer Dashboard</header>

<div class="container">

  <div class="top">
    <h2>Welcome, <span id="userEmail"></span></h2>
    <button id="logoutBtn" class="logout">Logout</button>
  </div>

  <div class="grid">

    <!-- WALLET -->
    <div class="card">
      <h2>Your Wallet</h2>
      <div class="label">Balance</div>
      <div class="value">¢<span id="balance">0</span></div>

      <button class="btn btn-green" id="add50">Add ¢50</button>
      <button class="btn btn-green" id="add100">Add ¢100</button>
      <button class="btn btn-yellow" id="goVerify">Go to Verify</button>
    </div>

    <!-- PLAN (OPTIONAL BUT MATCHES DESIGN) -->
    <div class="card">
      <h2>Your Plan</h2>

      <div class="label">Current Plan</div>
      <div class="value" style="font-size:1.4rem;" id="planType">none</div>

      <div class="label" style="margin-top:12px;">Remaining Searches</div>
      <div class="value" style="font-size:1.4rem;" id="remaining">0</div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId;
let walletRef;

const userEmail = document.getElementById("userEmail");
const balanceEl = document.getElementById("balance");
const planType = document.getElementById("planType");
const remaining = document.getElementById("remaining");

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user){
    return window.location.replace("employer-login.html");
  }

  userId = user.uid;
  walletRef = doc(db,"wallet",userId);

  userEmail.textContent = user.email;

  const u = await getDoc(doc(db,"users",userId));
  if(!u.exists() || u.data().role !== "employer"){
    return window.location.replace("employer-login.html");
  }

  await ensureWallet();
  await loadWallet();
});

/* CREATE WALLET */
async function ensureWallet(){
  const snap = await getDoc(walletRef);
  if(!snap.exists()){
    await setDoc(walletRef,{
      balance:0,
      plan:"none",
      monthlyRemaining:0
    });
  }
}

/* LOAD WALLET */
async function loadWallet(){
  const snap = await getDoc(walletRef);
  const w = snap.data();

  balanceEl.textContent = w.balance || 0;
  planType.textContent = w.plan || "none";
  remaining.textContent = w.monthlyRemaining || 0;
}

/* ADD MONEY */
async function addMoney(amount){
  const snap = await getDoc(walletRef);
  const bal = snap.data().balance || 0;

  await updateDoc(walletRef,{balance: bal + amount});

  await addDoc(collection(db,"wallet_transactions"),{
    user:userId,
    amount,
    type:"top_up",
    timestamp:new Date()
  });

  await loadWallet();
}

document.getElementById("add50").onclick = ()=>addMoney(50);
document.getElementById("add100").onclick = ()=>addMoney(100);

document.getElementById("goVerify").onclick = ()=>{
  window.location.href = "verify.html";
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  window.location.replace("employer-login.html");
};
</script>

</body>
</html>
