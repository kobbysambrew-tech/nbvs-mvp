<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NBVS — Employer Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
  --card:#fff;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"Inter",sans-serif;
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  color:#fff;
  padding:18px;
  text-align:center;
  font-weight:700;
}

.container{
  max-width:1000px;
  margin:30px auto;
  padding:0 16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.green{background:var(--green);color:#fff;}
.yellow{background:var(--yellow);}
.red{background:var(--red);color:#fff;}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logout{
  background:#111;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>NBVS — Employer Dashboard</header>

<div class="container">

  <div class="top">
    <h2>Welcome, <span id="email"></span></h2>
    <button id="logoutBtn" class="logout">Logout</button>
  </div>

  <div class="card">
    <h3>Wallet</h3>
    <p>Balance: ¢<span id="balance">0</span></p>

    <button class="btn green" id="add50">Add ¢50</button>
    <button class="btn green" id="add100">Add ¢100</button>
    <button class="btn yellow" id="goVerify">Go to Verify</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId;
let walletRef;

const emailEl = document.getElementById("email");
const balanceEl = document.getElementById("balance");

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user){
    return window.location.replace("employer-login.html");
  }

  userId = user.uid;
  walletRef = doc(db,"wallet",userId);

  emailEl.textContent = user.email;

  const u = await getDoc(doc(db,"users",userId));

  if(!u.exists() || (u.data().role||"") !== "employer"){
    return window.location.replace("employer-login.html");
  }

  await ensureWallet();
  await loadWallet();
});

/* CREATE WALLET */
async function ensureWallet(){
  const snap = await getDoc(walletRef);
  if(!snap.exists()){
    await setDoc(walletRef,{
      balance:0,
      createdAt:new Date()
    });
  }
}

/* LOAD WALLET */
async function loadWallet(){
  const snap = await getDoc(walletRef);
  balanceEl.textContent = snap.data().balance || 0;
}

/* ADD MONEY */
async function addMoney(amount){
  const snap = await getDoc(walletRef);
  const bal = snap.data().balance || 0;

  await updateDoc(walletRef,{
    balance: bal + amount
  });

  await addDoc(collection(db,"wallet_transactions"),{
    user:userId,
    amount,
    type:"top_up",
    timestamp:new Date()
  });

  await loadWallet();
}

/* BUTTONS */
document.getElementById("add50").onclick = ()=>addMoney(50);
document.getElementById("add100").onclick = ()=>addMoney(100);

document.getElementById("goVerify").onclick = ()=>{
  window.location.href = "verify.html";
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  window.location.replace("employer-login.html");
};

/* BLOCK BACK */
window.history.pushState(null,null,window.location.href);
window.onpopstate = function(){
  window.location.replace("employer-login.html");
};

</script>

</body>
</html>
