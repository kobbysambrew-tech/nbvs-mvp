<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NBVS — Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
}

body{
  margin:0;
  font-family:"Segoe UI",Arial;
  background:var(--bg);
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:20px;
  color:#fff;
  text-align:center;
  font-weight:700;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:0 16px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

h3{
  margin:0 0 10px;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-green{background:var(--green);color:#fff;}
.btn-red{background:#dc2626;color:#fff;}

.history-item{
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  flex-direction:column;
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:0.8rem;
  font-weight:600;
}

.valid{ background:#dcfce7; color:#166534; }
.bad{ background:#fee2e2; color:#991b1b; }

.time{
  font-size:0.8rem;
  color:#6b7280;
}
</style>
</head>

<body>

<header>NBVS — User Dashboard</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>👤 Profile</h3>
    <p><b>Email:</b> <span id="email">—</span></p>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h3>⚡ Actions</h3>
    <button class="btn btn-green" onclick="goVerify()">Verify Credential</button>
    <button class="btn btn-red" onclick="logout()">Logout</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h3>📄 Verification History</h3>
    <div id="history"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailEl = document.getElementById("email");
const historyEl = document.getElementById("history");

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "user_login.html";
    return;
  }

  emailEl.innerText = user.email;

  const q = query(
    collection(db,"search_logs"),
    where("userId","==",user.uid)
  );

  const snap = await getDocs(q);

  if(snap.empty){
    historyEl.innerHTML = "<p>No verifications yet.</p>";
    return;
  }

  // Convert + sort newest first
  const logs = [];
  snap.forEach(doc => logs.push(doc.data()));

  logs.sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

  historyEl.innerHTML = "";

  logs.forEach(d=>{
    const div = document.createElement("div");
    div.className = "history-item";

    const time = d.timestamp
      ? new Date(d.timestamp.seconds * 1000).toLocaleString()
      : "";

    div.innerHTML = `
      <div class="left">
        <b>${d.term}</b>
        <span class="time">${time}</span>
      </div>

      <span class="badge ${d.found ? "valid":"bad"}">
        ${d.found ? "VALID":"NOT FOUND"}
      </span>
    `;

    historyEl.appendChild(div);
  });
});

window.goVerify = ()=>{
  window.location.href = "verify.html";
};

window.logout = async ()=>{
  await signOut(auth);
  window.location.href = "user_login.html";
};
</script>

</body>
</html>
