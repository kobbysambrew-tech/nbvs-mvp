<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NBVS — Dashboard</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f6f7f9;
}

body{
  margin:0;
  font-family:"Segoe UI",Arial;
  background:var(--bg);
}

header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:20px;
  color:#fff;
  text-align:center;
  font-weight:700;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:0 16px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

h3{ margin:0 0 10px; }

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-green{background:var(--green);color:#fff;}
.btn-red{background:#dc2626;color:#fff;}

.history-item{
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  flex-direction:column;
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:0.8rem;
  font-weight:600;
}

.valid{ background:#dcfce7; color:#166534; }
.bad{ background:#fee2e2; color:#991b1b; }

.time{
  font-size:0.8rem;
  color:#6b7280;
}
</style>
</head>

<body>

<header>NBVS — User Dashboard</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>👤 Profile</h3>
    <p><b>Email:</b> <span id="email">—</span></p>
  </div>

  <!-- WALLET -->
  <div class="card">
    <h3>💰 Wallet</h3>
    <p><b>Balance:</b> ¢<span id="balance">0</span></p>
    <p><b>Plan:</b> <span id="plan">none</span></p>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
      <button class="btn btn-green" id="add30">+¢30</button>
      <button class="btn btn-green" id="add100">+¢100</button>
      <button class="btn" id="buyBasic">Buy BASIC</button>
      <button class="btn btn-red" id="buyPro">Buy PRO</button>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h3>⚡ Actions</h3>
    <button class="btn btn-green" onclick="goVerify()">Verify Credential</button>
    <button class="btn btn-red" onclick="logout()">Logout</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h3>📄 Verification History</h3>
    <div id="history"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs,
  doc, getDoc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const emailEl = document.getElementById("email");
const historyEl = document.getElementById("history");
const balanceEl = document.getElementById("balance");
const planEl = document.getElementById("plan");

/* WALLET */
function getWalletRef(){
  const user = auth.currentUser;
  if (!user) return null;
  return doc(db, "wallet", user.uid);
}

async function ensureWallet(){
  const ref = getWalletRef();
  if (!ref) return;

  const snap = await getDoc(ref);

  if (!snap.exists()){
    await setDoc(ref,{
      balance:0,
      plan:"none",
      monthlyRemaining:0,
      planExpires:null,
      createdAt:new Date()
    });
  }
}

async function loadWallet(){
  const ref = getWalletRef();
  if (!ref) return;

  const snap = await getDoc(ref);
  if (!snap.exists()) return;

  const w = snap.data();
  balanceEl.innerText = w.balance || 0;
  planEl.innerText = w.plan || "none";
}

/* BUTTONS */
document.getElementById("add30").onclick = async ()=>{
  const ref = getWalletRef();
  const snap = await getDoc(ref);
  const w = snap.data();

  await updateDoc(ref,{ balance:(w.balance || 0) + 30 });
  await loadWallet();
};

document.getElementById("add100").onclick = async ()=>{
  const ref = getWalletRef();
  const snap = await getDoc(ref);
  const w = snap.data();

  await updateDoc(ref,{ balance:(w.balance || 0) + 100 });
  await loadWallet();
};

document.getElementById("buyBasic").onclick = async ()=>{
  const ref = getWalletRef();

  await updateDoc(ref,{
    plan:"basic",
    monthlyRemaining:10
  });

  await loadWallet();
};

document.getElementById("buyPro").onclick = async ()=>{
  const ref = getWalletRef();

  const expires = new Date();
  expires.setDate(expires.getDate()+30);

  await updateDoc(ref,{
    plan:"pro",
    planExpires:expires
  });

  await loadWallet();
};

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "user_login.html";
    return;
  }

  emailEl.innerText = user.email;

  await ensureWallet();
  await loadWallet();

  const q = query(
    collection(db,"search_logs"),
    where("userId","==",user.uid)
  );

  const snap = await getDocs(q);

  if(snap.empty){
    historyEl.innerHTML = "<p>No verifications yet.</p>";
    return;
  }

  const logs = [];
  snap.forEach(doc => logs.push(doc.data()));

  logs.sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

  historyEl.innerHTML = "";

  logs.forEach(d=>{
    const div = document.createElement("div");
    div.className = "history-item";

    const time = d.timestamp?.toDate
      ? d.timestamp.toDate().toLocaleString()
      : "";

    div.innerHTML = `
      <div class="left">
        <b>${d.term}</b>
        <span class="time">${time}</span>
      </div>
      <span class="badge ${d.found ? "valid":"bad"}">
        ${d.found ? "VALID":"NOT FOUND"}
      </span>
    `;

    historyEl.appendChild(div);
  });
});

/* NAV */
window.goVerify = ()=>{
  window.location.href = "verify.html";
};

window.logout = async ()=>{
  await signOut(auth);
  window.location.href = "user_login.html";
};
</script>

</body>
</html>
