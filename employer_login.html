<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Employer Login — NBVS</title>

<style>
body{font-family:Arial;background:#f6f7f9;padding:40px}
.card{max-width:400px;margin:auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.1)}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px}
button{width:100%;padding:10px;background:#006b3f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
.note{font-size:13px;color:#666;margin-top:10px;text-align:center}
</style>
</head>

<body>

<div class="card">
  <h2>Employer Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>

  <div class="note" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    const udoc = await getDoc(doc(db,"users",user.uid));
    const role = (udoc.data().role || "").toLowerCase();

    if (role !== "employer"){
      msg.innerText = "Access denied (not employer)";
      return;
    }

    window.location.href = "employer_dashboard.html";

  } catch(e){
    msg.innerText = "Login failed";
  }
};
</script>

</body>
</html>
