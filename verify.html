<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NBVS — Credential Verification Portal</title>

<style>
:root{
  --red:#ce1126;
  --yellow:#fcd116;
  --green:#046c4e;
  --bg:#f4f6f9;
  --card:#ffffff;
  --muted:#6b7280;
}

body{
  font-family:"Inter",sans-serif;
  background:var(--bg);
  margin:0;
  color:#111;
}

/* HEADER */
header{
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
  padding:20px;
  text-align:center;
  color:#fff;
  font-weight:700;
  font-size:1.5rem;
}

/* LAYOUT */
main{
  max-width:800px;
  margin:30px auto;
  padding:0 16px;
}

.panel{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:1rem;
}

/* BUTTONS */
button{
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.btn-green{background:var(--green);color:#fff;}
.btn-yellow{background:var(--yellow);color:#111;}
.btn-red{background:var(--red);color:#fff;}

.row{
  display:flex;
  gap:12px;
  margin-top:14px;
}

/* RESULT CARD */
.result-card{
  border-radius:14px;
  padding:18px;
  margin-top:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.valid{
  border-left:6px solid var(--green);
}

.invalid{
  border-left:6px solid var(--red);
}

/* STATUS BADGE */
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  font-size:0.8rem;
  font-weight:700;
}

.badge-valid{
  background:#e6f7ed;
  color:#046c4e;
}

.badge-invalid{
  background:#fde8e8;
  color:#ce1126;
}

/* TRUST BAR */
.trust{
  text-align:center;
  font-size:0.85rem;
  color:var(--muted);
  margin-top:10px;
}
</style>
</head>

<body>
<header><h1>NBVS — Credential Verification</h1></header>

<main id="app" style="display:none">

  <div class="panel">
    <label>Enter Verification ID</label>
    <input id="searchInput" placeholder="e.g. NBVS-000123" />

    <div style="display:flex;gap:12px;margin-top:12px;align-items:center">
      <div class="small" id="planLabel">Plan: —</div>
      <div class="small" id="walletLabel" style="margin-left:auto">Balance: ¢—</div>
    </div>

    <div class="row">
      <button id="searchBtn" class="btn-green" style="flex:1">Verify</button>
      <button id="openWallet" class="btn-yellow" style="width:160px">Wallet</button>
    </div>
  </div>

  <div id="resultsArea"></div>

  <div class="panel">
    <h3>Plans</h3>

    <button id="buyBasic" class="btn-green" style="width:100%;margin-bottom:10px">
      Buy BASIC (10 searches)
    </button>

    <button id="buyPro" class="btn-red" style="width:100%;margin-bottom:10px">
      Buy PRO (30 days)
    </button>

    <button id="convertWallet" class="btn-yellow" style="width:100%">
      Convert Wallet → Searches
    </button>
  </div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, addDoc, getDocs, query, where, limit
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const appEl = document.getElementById("app");
const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const resultsArea = document.getElementById("resultsArea");
const planLabel = document.getElementById("planLabel");
const walletLabel = document.getElementById("walletLabel");

const buyBasic = document.getElementById("buyBasic");
const buyPro = document.getElementById("buyPro");
const convertWallet = document.getElementById("convertWallet");
const openWallet = document.getElementById("openWallet");

const SEARCH_COST = 30;

/* WALLET */
async function ensureWallet(uid){
  const ref = doc(db,"wallet",uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      balance:0,
      plan:"none",
      monthlyRemaining:0,
      planExpires:null
    });
  }
}

async function loadWallet(uid){
  const snap = await getDoc(doc(db,"wallet",uid));
  return snap.exists() ? snap.data() : null;
}

function formatPlan(u){
  if(u.plan === "pro") return "PRO PLAN";
  if(u.plan === "basic") return `BASIC (${u.monthlyRemaining || 0})`;
  return "No plan";
}

async function refresh(uid){
  const w = await loadWallet(uid);
  if(!w) return;

  walletLabel.innerText = `Balance: ¢${w.balance || 0}`;
  planLabel.innerText = formatPlan(w);

  appEl.style.display = "block";
}

/* SEARCH */
async function search(uid){
const term = searchInput.value.trim();
console.log("Searching for:", term);
  if(!term) return;

  const walletRef = doc(db,"wallet",uid);
  const snap = await getDoc(walletRef);
  const w = snap.data();

  // deduct
  if(w.monthlyRemaining > 0){
    await updateDoc(walletRef,{monthlyRemaining: w.monthlyRemaining - 1});
  }
  else if(w.balance >= SEARCH_COST){
    await updateDoc(walletRef,{balance: w.balance - SEARCH_COST});
  }
  else{
    resultsArea.innerHTML = "❌ Not enough balance";
    return;
  }

  const docs = await getDocs(
    query(collection(db,"records"),
    where("verificationId","==",term.toUpperCase()),
    limit(1))
  );
console.log("Docs found:", docs.empty ? 0 : docs.docs.length);
  const found = !docs.empty;

  if(!found){
    resultsArea.innerHTML = "No record found";
  } else {
    const r = docs.docs[0].data();
    resultsArea.innerHTML = `
      <div class="record">
        <p><b>${r.graduateName}</b></p>
        <p>${r.institutionName}</p>
        <p>${r.qualification}</p>
        <p>Status: ${r.status}</p>
      </div>
    `;
  }

  // log
  await addDoc(collection(db,"search_logs"),{
    user: uid,
    term,
    found,
    timestamp:new Date()
  });

  await refresh(uid);
}

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("employer-login.html");
    return;
  }

  const uid = user.uid;

  // 🔒 ROLE CHECK
  const userDoc = await getDoc(doc(db,"users",uid));
  if(!userDoc.exists() || userDoc.data().role !== "employer"){
    window.location.replace("employer-login.html");
    return;
  }

  await ensureWallet(uid);
  await refresh(uid);

  searchBtn.onclick = ()=> search(uid);

  buyBasic.onclick = async ()=>{
    const ref = doc(db,"wallet",uid);
    const w = (await getDoc(ref)).data();

    await updateDoc(ref,{
      plan:"basic",
      monthlyRemaining:(w.monthlyRemaining || 0) + 10
    });

    await refresh(uid);
  };

  buyPro.onclick = async ()=>{
    const ref = doc(db,"wallet",uid);

    await updateDoc(ref,{
      plan:"pro",
      planExpires:new Date(Date.now()+30*86400000)
    });

    await refresh(uid);
  };

  convertWallet.onclick = async ()=>{
    const ref = doc(db,"wallet",uid);
    const w = (await getDoc(ref)).data();

    const amount = Math.floor(w.balance / SEARCH_COST);

    await updateDoc(ref,{
      balance:w.balance - (amount*SEARCH_COST),
      monthlyRemaining:(w.monthlyRemaining||0)+amount
    });

    await refresh(uid);
  };

  openWallet.onclick = ()=>{
    window.location.href = "employer-dashboard.html";
  };

});
</script>

</body>
</html>
