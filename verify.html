<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NBVS — Credential Verification Portal</title>

<style>
:root{--red:#ce1126;--yellow:#fcd116;--green:#006b3f;--bg:#f6f7f9;--muted:#555}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);margin:0;color:#222}
header{background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));
padding:18px;text-align:center;color:#fff;font-weight:700}
main{max-width:900px;margin:18px auto;padding:0 16px}
.panel{background:#fff;padding:16px;border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);margin-bottom:16px}
label{display:block;font-size:0.9rem;color:var(--muted);margin-bottom:6px}
input{width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;
margin-bottom:12px;font-size:1rem}
button{padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:700}
.btn-green{background:var(--green);color:#fff}
.btn-yellow{background:var(--yellow);color:#111}
.btn-red{background:#ce1126;color:#fff}
.record{background:#fff;border-left:5px solid var(--green);padding:12px;
border-radius:8px;margin-top:12px}
.small{font-size:.9rem;color:var(--muted)}
.row{display:flex;gap:12px;margin-top:12px}
.badge{
  display:inline-block;
  padding:3px 10px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,0.12);
  background:#f3f4f6;
  font-size:0.8rem;
  margin-left:8px;
}
.badge-ok{background:#ecfdf5;border-color:rgba(0,107,63,0.25);color:#065f46}
.badge-warn{background:#fff7ed;border-color:rgba(234,88,12,0.25);color:#9a3412}
.badge-bad{background:#fef2f2;border-color:rgba(220,38,38,0.25);color:#991b1b}
  .record {
  background:#fff;
  border-left:6px solid var(--green);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
</style>
</head>

<body>
<header><h1>NBVS — Credential Verification</h1></header>
<main id="app" style="display:none">
  <div class="panel">

    <label for="searchInput">Enter Verification ID</label>
   <input id="searchInput" placeholder="e.g. NBVS-000123" />

    <div style="display:flex;gap:12px;margin-top:12px;align-items:center">
      <div class="small" id="planLabel">Plan: —</div>
      <div class="small" id="walletLabel" style="margin-left:auto">Balance: ¢—</div>
    </div>

    <div class="row">
     <button id="searchBtn" class="btn-green" style="flex:1">Verify Credential</button>
      <button id="openWallet" class="btn-yellow" style="width:160px">Open Wallet</button>
    </div>

   <p class="small" style="margin-top:10px">
  Enter a valid NBVS verification ID to confirm credential authenticity.
</p>
  </div>

  <div id="resultsArea"></div>

  <div class="panel">
    <h3>Plans & Conversion</h3>
    <div style="display:flex;gap:10px;margin-bottom:8px">
      <button id="buyBasic" class="btn-green" style="flex:1">
        Buy BASIC — 10 verifications — $3.99
      </button>
      <button id="buyPro" class="btn-red" style="flex:1">
        Buy PRO — 30 days — $14.99
      </button>
    </div>

    <div style="display:flex;gap:10px">
      <button id="convertWallet" class="btn-yellow" style="flex:1">
        Convert Wallet → Verifications (¢30 each)
      </button>
      <button id="refreshBtn" style="flex:1">Refresh</button>
    </div>

    <p class="small" style="margin-top:8px">
      Conversion uses whole multiples of ¢30; remainder stays in wallet.
    </p>
  </div>
</main>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, addDoc, getDocs, query, where, limit
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey:"AIzaSyCDh_qL3jiCMHROK0_Soul2Wsv3t3y4wv0",
  authDomain:"nbvs-ghana.firebaseapp.com",
  projectId:"nbvs-ghana",
  storageBucket:"nbvs-ghana.firebasestorage.app",
  messagingSenderId:"702636577113",
  appId:"1:702636577113:web:8369b43a2aa43aeb95fc48"
};

const appFB = initializeApp(firebaseConfig);
const db = getFirestore(appFB);
const auth = getAuth(appFB);

/* ---------------- CONSTANTS ---------------- */
const SEARCH_COST = 30;

function getWalletRef(){
  const user = auth.currentUser;
  if (!user) return null;
  return doc(db, "wallet", user.uid);
}

const appEl = document.getElementById("app");
const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const resultsArea = document.getElementById("resultsArea");
const planLabel = document.getElementById("planLabel");
const walletLabel = document.getElementById("walletLabel");

/* ---------------- WALLET ---------------- */
async function ensureWallet(){
  const walletRef = getWalletRef();
  if (!walletRef) return;

  const snap = await getDoc(walletRef);

  if (!snap.exists()){
    await setDoc(walletRef,{
      balance:0,
      plan:"none",
      monthlyRemaining:0,
      planExpires:null,
      createdAt:new Date()
    });
  }
}

async function loadWallet(){
  const walletRef = getWalletRef();
  if (!walletRef) return null;

  const snap = await getDoc(walletRef);
  return snap.exists() ? snap.data() : null;
}

function formatPlanLabel(u){
  if (u.plan === "pro" && u.planExpires){
    return `Plan: PRO`;
  }
  if (u.plan === "basic"){
    return `Plan: BASIC (${u.monthlyRemaining || 0} left)`;
  }
  return "Plan: none";
}

async function refreshUI(){
  const u = await loadWallet();
  if (!u) return;

  planLabel.innerText = formatPlanLabel(u);
  walletLabel.innerText = `Balance: ¢${u.balance || 0}`;
  appEl.style.display = "block";
}

/* ---------------- DEDUCT MONEY ---------------- */
async function deductSearch(){

  const user = auth.currentUser;
  if (!user){
    alert("Login required");
    return false;
  }

  const walletRef = doc(db,"wallet",user.uid);
  const snap = await getDoc(walletRef);

  if (!snap.exists()) return false;

  const u = snap.data();
  const now = new Date();

  // PRO
  if (u.plan === "pro" && u.planExpires){
    if (new Date(u.planExpires) > now){
      await addDoc(collection(db,"wallet_transactions"),{
        userId:user.uid,
        type:"verification (pro)",
        amount:0,
        timestamp:new Date()
      });
      return true;
    }
  }

  // BASIC
  if ((u.monthlyRemaining || 0) > 0){
    await updateDoc(walletRef,{
      monthlyRemaining: u.monthlyRemaining - 1
    });

    await addDoc(collection(db,"wallet_transactions"),{
      userId:user.uid,
      type:"verification (basic)",
      amount:0,
      timestamp:new Date()
    });

    return true;
  }

  // WALLET
  if ((u.balance || 0) >= SEARCH_COST){
    await updateDoc(walletRef,{
      balance: u.balance - SEARCH_COST
    });

    await addDoc(collection(db,"wallet_transactions"),{
      userId:user.uid,
      type:"verification",
      amount:-SEARCH_COST,
      timestamp:new Date()
    });

    return true;
  }

  return false;
}

/* ---------------- SEARCH ---------------- */
async function performSearch(term){
  const snap = await getDocs(
    query(collection(db,"records"),
    where("verificationId","==", term.toUpperCase()),
    limit(1))
  );
  return snap.docs;
}

/* ---------------- BUTTON ---------------- */
searchBtn.onclick = async () => {

  const term = searchInput.value.trim();
  if (!term){
    resultsArea.innerHTML = "Enter ID";
    return;
  }

  resultsArea.innerHTML = "Checking wallet...";

  const ok = await deductSearch();

  if (!ok){
    resultsArea.innerHTML = "❌ Not enough balance";
    return;
  }

  resultsArea.innerHTML = "Searching...";

  const docs = await performSearch(term);

  if (!docs.length){
    resultsArea.innerHTML = "No record found";
  } else {
    const r = docs[0].data();

    resultsArea.innerHTML = `
      <div class="record">
        <p><b>${r.graduateName}</b></p>
        <p>${r.institutionName}</p>
        <p>${r.qualification}</p>
        <p>Status: ${r.status}</p>
      </div>
    `;
  }
// 🔥 ADD THIS BLOCK RIGHT HERE
await addDoc(collection(db,"search_logs"),{
  term,
  userId: auth.currentUser.uid, // THIS IS THE FIX
  found: docs.length > 0,
  timestamp: new Date()
});
  await refreshUI();
};

/* ---------------- INIT ---------------- */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    await ensureWallet();
    await refreshUI();
  } else {
    alert("Login as employer first");
    window.location.href = "employer_login.html";
  }
});
</script>

</body>
</html>
